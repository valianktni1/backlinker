name: backlinkgen

services:
  # -----------------------------------------------------------
  # MongoDB Database
  # -----------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: backlinkgen-mongodb
    restart: unless-stopped
    volumes:
      - /mnt/apps/backlinkgen/mongodb:/data/db
    networks:
      - backlinkgen-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # Backend API (FastAPI)
  # -----------------------------------------------------------
  backend:
    image: python:3.11-slim
    container_name: backlinkgen-backend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=backlink_builder
      - JWT_SECRET=${JWT_SECRET}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SENDER_EMAIL=${SENDER_EMAIL:-}
      - SERPAPI_API_KEY=${SERPAPI_API_KEY:-}
    volumes:
      - /mnt/apps/backlinkgen/repo/backend:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn server:app --host 0.0.0.0 --port 8001"
    networks:
      - backlinkgen-net
    healthcheck:
      test: curl -f http://localhost:8001/api/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # -----------------------------------------------------------
  # Frontend (React + Nginx)
  # -----------------------------------------------------------
  frontend:
    image: nginx:alpine
    container_name: backlinkgen-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3333:80"
    volumes:
      - /mnt/apps/backlinkgen/repo/frontend/build:/usr/share/nginx/html:ro
      - /mnt/apps/backlinkgen/repo/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backlinkgen-net

networks:
  backlinkgen-net:
    driver: bridge
